services:
  app:
    image: ghcr.io/tosumitdhaka/trishul-snmp-suite:latest
    container_name: trishul-snmp-suite
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8000"
      - "${SNMP_PORT:-1061}:${SNMP_PORT:-1061}/udp"
      - "${TRAP_PORT:-1162}:${TRAP_PORT:-1162}/udp"
    volumes:
      - trishul-snmp-suite-data:/app/backend/data
    environment:
      - PYTHONUNBUFFERED=1
      # Application Metadata
      - APP_NAME=${APP_NAME:-Trishul SNMP Suite}
      - APP_VERSION=${APP_VERSION:-1.4.1}
      - APP_AUTHOR=${APP_AUTHOR:-Sumit Dhaka}
      - APP_DESCRIPTION=${APP_DESCRIPTION:-Professional SNMP Simulation Tool}
      # SNMP Settings
      - SNMP_PORT=${SNMP_PORT:-1061}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - TRAP_PORT=${TRAP_PORT:-1162}
      # Security
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}
      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:8000,http://localhost:8900,http://localhost:8980}
      # Auto-Start flags (Part A)
      - AUTO_START_SIMULATOR=${AUTO_START_SIMULATOR:-true}
      - AUTO_START_TRAP_RECEIVER=${AUTO_START_TRAP_RECEIVER:-true}
      # Remote MIB dependency fetch
      - MIB_AUTO_FETCH=${MIB_AUTO_FETCH:-false}
      - MIB_REMOTE_SOURCES=${MIB_REMOTE_SOURCES:-}
      # WebSocket internal UDP side-channel
      - WS_INTERNAL_PORT=${WS_INTERNAL_PORT:-19876}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  trishul-snmp-suite-data:
